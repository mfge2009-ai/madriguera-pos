        </div>`;
      }).join('')}
    </div>
    <div style="font-weight:700;font-size:13px;margin-bottom:10px">Mesas con más de 30 min</div>
    ${T.filter(t=>t.openedAt&&Math.floor((Date.now()-new Date(t.openedAt).getTime())/60000)>30).length===0
      ?'<div style="color:var(--text3);font-size:13px">Ninguna</div>'
      :T.filter(t=>t.openedAt&&Math.floor((Date.now()-new Date(t.openedAt).getTime())/60000)>30).map(t=>{
        const mins=Math.floor((Date.now()-new Date(t.openedAt).getTime())/60000);
        const tT=t.order.reduce((a,i)=>a+i.price*i.qty,0);
        return `<div class="mrow" style="margin-bottom:6px;border-color:#fcd34d;background:#fffbe6">
          <div><span style="font-weight:700">${t.name}</span><span style="font-size:12px;color:var(--text3);margin-left:8px">${t.order.map(i=>i.qty+'x '+i.name).join(', ')}</span></div>

            <span style="font-weight:700">${fmt(tT)}</span>
          </div>
        </div>`;
      }).join('')}
  </div>`;

window.buscarDevolucion=function(q){
  const res=document.getElementById('dv-resultado');if(!res)return;
  if(!q||q.length<2){res.textContent='';return;}
  const found=P.find(p=>p.name.toLowerCase().includes(q.toLowerCase())||(p.code&&p.code.includes(q)));
  if(found){
    res.innerHTML=`<span style="color:var(--grn);font-weight:600">✓ ${found.name}</span> · Stock actual: <strong>${found.stock}</strong> · ${fmt(found.price)}`;
    res.dataset.pid=found.id;
  } else {
    res.textContent='Producto no encontrado en catálogo';
    res.dataset.pid='';
  }
};

function attachDevoluciones(){
  const mc=document.getElementById('mc');
  mc.querySelector('#bdvnew')?.addEventListener('click',()=>{devForm=true;render();});
  mc.querySelector('#bdvcancel')?.addEventListener('click',()=>{devForm=false;render();});
  mc.querySelector('#bdvsave')?.addEventListener('click',async()=>{
    const prodInput=document.getElementById('dv-prod').value.trim();
    const prov=document.getElementById('dv-prov').value.trim();
    const qty=parseInt(document.getElementById('dv-qty').value)||1;
    const motivo=document.getElementById('dv-motivo').value;
    const obs=document.getElementById('dv-obs').value.trim();
    const res=document.getElementById('dv-resultado');
    const pid=res?.dataset?.pid;
    const prod=pid?P.find(p=>p.id===pid):P.find(p=>p.name.toLowerCase().includes(prodInput.toLowerCase())||(p.code&&p.code.includes(prodInput)));
    if(!prod){alert('Busca y selecciona un producto válido');return;}
    if(qty<=0){alert('La cantidad debe ser mayor a 0');return;}
    // Restore stock
    prod.stock=Math.max(0,(prod.stock||0)+qty);
    await sP();
    // Register devolution
    S.push({id:`dev${Date.now()}`,esDevolucion:true,prodName:prod.name,prodCode:prod.code||'',prodId:prod.id,proveedor:prov,qty,motivo,obs,date:new Date().toISOString(),user:turnoUser,total:0,closed:false});
    await sS();
    devForm=false;alert(`✓ Devolución registrada. Stock de "${prod.name}" actualizado a ${prod.stock} uds.`);
  });
}

let repPeriodo='semana'; // semana | mes | custom
let repCatFilter='Todos';
let repFechaDesde='';
let repFechaHasta='';

function getRangeFilter(){
  const now=new Date();
  if(repPeriodo==='hoy'){
    const d=now.toISOString().slice(0,10);
    return s=>s.date.startsWith(d);
  }
  if(repPeriodo==='semana'){
    const d=new Date(now);d.setDate(d.getDate()-6);
    return s=>s.date>=d.toISOString().slice(0,10);
  }
  if(repPeriodo==='mes'){
    const m=now.toISOString().slice(0,7);
    return s=>s.date.startsWith(m);
  }
  if(repPeriodo==='mes_ant'){
    const d=new Date(now.getFullYear(),now.getMonth()-1,1);
    const m=d.toISOString().slice(0,7);
    return s=>s.date.startsWith(m);
  }
  if(repPeriodo==='custom'&&repFechaDesde&&repFechaHasta){
    return s=>s.date.slice(0,10)>=repFechaDesde&&s.date.slice(0,10)<=repFechaHasta;
  }
  return ()=>true;
}

function attachReportes(){
  const mc=document.getElementById('mc');

  mc.querySelectorAll('[data-repcat]').forEach(el=>el.addEventListener('click',()=>{repCatFilter=el.dataset.repcat;render();}));

    repFechaHasta=document.getElementById('rfhasta')?.value||'';
    render();
  });
  mc.querySelector('#bexport')?.addEventListener('click',()=>{
    const filter=getRangeFilter();
    const ventas=S.filter(s=>isVenta(s)&&filter(s));
    // Build CSV
    const rows=[['Fecha','Hora','Mesa','Producto','ISBN/Codigo','Autor','Categoria','Subcategoria','Variante','Cantidad','Precio Unit.','Total','Metodo Pago','Cajero']];
    ventas.forEach(s=>{
      s.items?.forEach(i=>{
        const prod=P.find(x=>x.id===i.productId||x.name===i.name);
        rows.push([
          new Date(s.date).toLocaleDateString('es-EC'),
          new Date(s.date).toLocaleTimeString('es-EC',{hour:'2-digit',minute:'2-digit'}),
          s.tableName,
          i.name,
          prod?.code||'',
          prod?.author||'',
          prod?.category||'',
          prod?.subcategory||'',
          i.variant||'',
          i.qty,
          i.price.toFixed(2),
          (i.price*i.qty).toFixed(2),
          s.paymentMethod,
          s.user||''
        ]);
      });
    });
    const gastoRows=S.filter(s=>s.esGasto&&filter(s));
    if(gastoRows.length>0){
      rows.push([]);
      rows.push(['--- GASTOS ---','','','','','','','','']);
      rows.push(['Fecha','Descripcion','Categoria','','','','Monto','Metodo','Cajero']);
      gastoRows.forEach(g=>rows.push([new Date(g.date).toLocaleDateString('es-EC'),g.desc,g.cat,'','','',g.total.toFixed(2),g.paymentMethod,g.user||'']));
    }
    const csv=rows.map(r=>r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',')).join('\n');
    const blob=new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;
    const periodo=repPeriodo==='custom'?`${repFechaDesde}_${repFechaHasta}`:repPeriodo;
    a.download=`madriguera_reporte_${periodo}_${new Date().toISOString().slice(0,10)}.csv`;
    a.click();URL.revokeObjectURL(url);
  });
}

      var matches = CL.filter(function(cl){
        return (cl.nombre&&cl.nombre.toLowerCase().includes(q))||
               (cl.identificacion&&cl.identificacion.includes(q))||
               (cl.email&&cl.email.toLowerCase().includes(q))||
               (cl.telefono&&cl.telefono.includes(q));

        var div = document.createElement('div');

        div.innerHTML='<div style="font-weight:700;color:#1a1a1a">'+cl.nombre+'</div>'
          +'<div style="color:#888;font-size:11px">'+cl.tipo+' · '+cl.identificacion+(cl.email?' · '+cl.email:'')+'</div>';

      });

// ── Barcode Scanner ──────────────────────────────────────────
let scanStream = null;
let scanInterval = null;

function stopScanner(){
  if(scanInterval){clearInterval(scanInterval);scanInterval=null;}
  if(scanStream){scanStream.getTracks().forEach(t=>t.stop());scanStream=null;}
  document.getElementById('scan-modal').style.display='none';
}

function handleScannedCode(code){
  code = code.trim().replace(/[^0-9X]/gi,'');
  if(code.length < 8) return;
  stopScanner();
  // Search by code
  const found = P.find(p=>p.code&&p.code.replace(/[^0-9X]/gi,'')===code);
  if(found){
    document.getElementById('scan-result') && (document.getElementById('scan-result').textContent='');
    // Set search to the code and trigger
    sq = found.name;
    scat = 'Todos';
    render();
    // If mesa selected, add directly
    if(selT){
      if(found.hasVariants){ vtarget=found.id; vsize='Mediano'; vmilk='Entera'; rVPanel(); }
      else addItem(found, null);
    }
  } else {
    // Not found - put in search box
    sq = code; scat = 'Todos';
    render();
    setTimeout(()=>{
      const si=document.getElementById('si');
      if(si){si.focus();}
    },300);
  }
}

async function openScanner(){
  const modal = document.getElementById('scan-modal');
  const status = document.getElementById('scan-status');
  const result = document.getElementById('scan-result');
  result.style.display='none';
  modal.style.display='flex';

  // Try BarcodeDetector API first (Chrome on Android)
  if('BarcodeDetector' in window){
    try{
      const bd = new BarcodeDetector({formats:['ean_13','ean_8','code_128','code_39','upc_a']});
      scanStream = await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
      const video = document.getElementById('scan-video');
      video.srcObject = scanStream;
      await video.play();
      status.textContent = 'Escaneando... apunta al código';
      scanInterval = setInterval(async()=>{
        try{
          const barcodes = await bd.detect(video);
          if(barcodes.length>0){
            const code = barcodes[0].rawValue;
            result.textContent = '✓ Código: '+code;
            result.style.display='block';
            setTimeout(()=>handleScannedCode(code), 500);
          }
        }catch(e){}
      }, 500);
      return;
    }catch(e){
      status.textContent = 'Cámara no disponible. Ingresa el ISBN manualmente.';
      if(scanStream){scanStream.getTracks().forEach(t=>t.stop());scanStream=null;}
    }
  } else {
    // Fallback: try camera with canvas
    try{
      scanStream = await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
      const video = document.getElementById('scan-video');
      video.srcObject = scanStream;
      await video.play();
      status.textContent = 'Cámara activa — usa el campo manual si no detecta automáticamente';
    }catch(e){
      status.textContent = 'Sin acceso a cámara. Ingresa el ISBN manualmente.';
    }
  }
}

  function ready(fn){ if(document.readyState!=='loading'){fn();}else{document.addEventListener('DOMContentLoaded',fn);} }

// USB barcode scanner support (types fast as keyboard input)
(function(){
  let scanBuffer='', scanTimer=null;
  document.addEventListener('keydown', function(e){
    // Only when POS is active and no input focused
    if(view!=='pos') return;
    const active = document.activeElement;
    const isInput = active&&(active.tagName==='INPUT'||active.tagName==='TEXTAREA');
    if(isInput && active.id!=='si') return;
    if(e.key.length===1 && /[0-9]/.test(e.key)){
      scanBuffer += e.key;
      if(scanTimer) clearTimeout(scanTimer);
      scanTimer = setTimeout(function(){
        if(scanBuffer.length >= 8){
          handleScannedCode(scanBuffer);
        }
        scanBuffer='';
      }, 100);
    }
  });
})();

// ── Patch: fix Americano variants after subRT loads ────────────
function patchProducts(){
  // Fix scientific notation ISBNs
  let isbnFixed=false;
  P.forEach(p=>{
    const code=String(p.code||'');
    if(code.includes('E+') || code.includes('e+')){
      try{
        const fixed=String(parseInt(parseFloat(code.replace(',','.'))));
        if(fixed.length>=10){p.code=fixed;isbnFixed=true;}
      }catch(e){}
    }
  });
  if(isbnFixed)sP();
  // Fix wrong hasVariants on non-espresso drinks
  const noVariants=['Americano','Long Black','Filtrado de temporada','Cold Brew',
    'Jamaica Tea','Té de especialidad','Té helado','Agua Mineral','Coca Cola',
    'Cerveza','Botella de agua','Purple latte','Extracto'];
  let varFixed=false;
  P.forEach(p=>{
    if(p.hasVariants && noVariants.some(n=>p.name.toLowerCase().includes(n.toLowerCase()))){
      p.hasVariants=false;varFixed=true;
    }
  });
  if(varFixed)sP();
}
