<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>La Madriguera — POS</title>
<!--
CONFIGURACIÓN FIREBASE:

4. Firestore → Reglas → allow read, write: if true → Publicar
5. Sube este archivo a Netlify (app.netlify.com/drop)

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#f8f6f1;--bg2:#fff;--bg3:#f0ede6;
  --text:#1a1a1a;--text2:#555;--text3:#999;
  --border:#ddd8ce;--b2:#c8c2b5;
  --acc:#5c4a2a;--acc2:#7a6240;--acl:#ede5d0;
  --grn:#1f6b45;--gbg:#d4edda;--gbrd:#a8d5b8;
  --amb:#8a4f00;--abg:#fff3cd;--abrd:#ffd77a;
  --red:#8b1a1a;--rbg:#fde8e8;--rbrd:#f5a5a5;
  --blu:#1a3f8b;--bbg:#ddeeff;--bbrd:#93bfee;
  --r:10px;--rs:7px;
}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);height:100dvh;overflow:hidden;font-size:14px}
#app{display:none;flex-direction:column;height:100dvh}
#loading{display:flex;align-items:center;justify-content:center;height:100dvh;flex-direction:column;gap:14px}
.spin{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--acc);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
/* Header */
header{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 14px;height:44px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:10px}
.logo{font-size:15px;font-weight:700;color:var(--acc);white-space:nowrap}
#hinfo{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:8px;white-space:nowrap}
.dot{width:7px;height:7px;border-radius:50%;background:#ccc}
.dot.on{background:#22c55e}
/* Nav */
nav{background:var(--bg2);border-bottom:1px solid var(--border);display:flex;overflow-x:auto;padding:0 6px;flex-shrink:0;scrollbar-width:none}
nav::-webkit-scrollbar{display:none}
nav button{padding:9px 13px;border:none;background:none;cursor:pointer;font-size:12px;font-family:inherit;color:var(--text2);white-space:nowrap;border-bottom:2px solid transparent}
nav button.active{color:var(--acc);border-bottom-color:var(--acc);font-weight:700}
/* Tbar */
#tbar{background:var(--acl);border-bottom:1px solid #d4c4a0;padding:4px 14px;font-size:11px;color:var(--acc);font-weight:500;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#mc{flex:1;overflow:hidden;display:flex;flex-direction:column;min-height:0}
/* Turno modal */
.modal-bg{position:absolute;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:100}
.modal{background:var(--bg2);border-radius:var(--r);padding:24px;width:320px;max-width:90vw}
.modal h2{font-size:16px;font-weight:700;margin-bottom:16px;color:var(--acc)}
/* POS layout */
#pos-wrap{display:flex;flex:1;overflow:hidden;min-height:0}
#mesa-strip{background:var(--bg2);border-bottom:1px solid var(--border);padding:7px 10px;display:flex;gap:6px;overflow-x:auto;flex-shrink:0;scrollbar-width:none;align-items:center}
#mesa-strip::-webkit-scrollbar{display:none}
.mchip{padding:5px 11px;border-radius:20px;font-size:12px;cursor:pointer;border:1.5px solid var(--b2);background:var(--bg3);color:var(--text2);white-space:nowrap;font-family:inherit;flex-shrink:0}
.mchip.ocp{background:#fffbe6;border-color:#f5c842;color:#7a5c00;font-weight:600}
.mchip.enviada{background:#e6f4ff;border-color:#93bfee;color:var(--blu);font-weight:600}
.mchip.cobrar{background:#d4edda;border-color:var(--gbrd);color:var(--grn);font-weight:600}
.mchip.sel{background:var(--acc);border-color:var(--acc);color:#fff !important;font-weight:700}
/* Search col */
#scol{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;min-height:0}
#stop{padding:8px 10px;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--bg2)}
.swr{position:relative}
.sic{position:absolute;left:9px;top:50%;transform:translateY(-50%);font-size:14px;pointer-events:none;opacity:.4}
#si{width:100%;padding:8px 10px 8px 30px;border-radius:var(--rs);border:1.5px solid var(--b2);font-size:14px;font-family:inherit;background:var(--bg);color:var(--text);outline:none}
#si:focus{border-color:var(--acc);background:var(--bg2)}
#ctabs{display:flex;gap:5px;overflow-x:auto;margin-top:7px;scrollbar-width:none;padding-bottom:1px}
#ctabs::-webkit-scrollbar{display:none}
.ctab{padding:4px 11px;border-radius:20px;font-size:11px;cursor:pointer;border:1px solid var(--b2);background:var(--bg3);color:var(--text2);white-space:nowrap;font-family:inherit;flex-shrink:0}
.ctab.on{background:var(--acc);border-color:var(--acc);color:#fff;font-weight:600}
#results{flex:1;overflow-y:auto;padding:0}
.rrow{display:flex;align-items:center;gap:8px;padding:8px 12px;border-bottom:.5px solid var(--border);cursor:pointer}
.rrow:active{background:var(--acl)}
.rn{font-size:12px;font-weight:600;line-height:1.3}
.rm{font-size:10px;color:var(--text3);margin-top:1px}
.rp{font-size:13px;font-weight:700;color:var(--acc);margin-left:auto;white-space:nowrap;padding-left:8px}
.radd{width:26px;height:26px;border-radius:50%;background:var(--acc);color:#fff;border:none;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.rcbadge{display:inline-block;padding:1px 6px;border-radius:8px;font-size:9px;font-weight:600;margin-right:3px}
.nores{text-align:center;padding:40px 16px;color:var(--text3);font-size:13px}
/* Variant panel */
#vpanel{background:var(--bg2);border-top:1px solid var(--border);padding:11px 12px;flex-shrink:0;display:none}
#vpanel.show{display:block}
.vttl{font-size:12px;font-weight:700;margin-bottom:9px}
.vgrp{margin-bottom:9px}
.vlbl{font-size:10px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.3px;margin-bottom:5px}
.vopts{display:flex;flex-wrap:wrap;gap:5px}
.vopt{padding:4px 11px;border-radius:20px;font-size:11px;cursor:pointer;border:1.5px solid var(--b2);background:var(--bg3);color:var(--text2);font-family:inherit}
.vopt.on{background:var(--acc);border-color:var(--acc);color:#fff;font-weight:600}
.vact{display:flex;gap:7px;margin-top:9px}
/* Order panel */
#opanel{width:280px;min-width:280px;display:flex;flex-direction:column;border-left:1px solid var(--border);background:var(--bg2);overflow:hidden;min-height:0}
#ohdr{padding:9px 12px;border-bottom:1px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:space-between}
#omesa{font-size:13px;font-weight:700}
#oitems{flex:1;overflow-y:auto;padding:2px 0;min-height:0}
.oi{display:flex;align-items:center;gap:6px;padding:7px 10px;border-bottom:.5px solid var(--border)}
.oin{flex:1;min-width:0}
.oinn{font-size:11px;font-weight:600;line-height:1.3;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.oiv{font-size:10px;color:var(--text3)}
.oic{display:flex;align-items:center;gap:4px;flex-shrink:0}
.qb{width:21px;height:21px;border-radius:50%;border:1.5px solid var(--b2);background:var(--bg3);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;font-family:inherit;color:var(--text)}
.oip{font-size:11px;font-weight:700;min-width:44px;text-align:right;color:var(--acc)}
.oempty{text-align:center;padding:24px 12px;color:var(--text3);font-size:12px;line-height:1.6}
/* Order footer */
#oftr{padding:10px 12px;border-top:1px solid var(--border);flex-shrink:0}
.tot{display:flex;justify-content:space-between;font-weight:700;font-size:15px;margin-bottom:10px}
.pgrid{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:9px}
.payb{padding:7px 4px;text-align:center;font-size:11px;font-weight:500;border-radius:var(--rs);cursor:pointer;border:1.5px solid var(--b2);background:var(--bg3);color:var(--text2);font-family:inherit}
.payb.on{background:var(--acl);border-color:var(--acc);color:var(--acc);font-weight:700}
/* Buttons */
.btn{padding:7px 14px;border-radius:var(--rs);font-size:12px;font-weight:600;border:1px solid transparent;cursor:pointer;font-family:inherit}
.btn-acc{background:var(--acc);color:#fff}
.btn-g{background:none;border:1px solid var(--border);color:var(--text2)}
.btn-g:hover{background:var(--bg3)}
.btn-ok{background:var(--gbg);color:var(--grn);border:1px solid var(--gbrd)}
.btn-w{background:var(--abg);color:var(--amb);border:1px solid var(--abrd)}
.btn-r{background:var(--rbg);color:var(--red);border:1px solid var(--rbrd)}
.btn-b{background:var(--bbg);color:var(--blu);border:1px solid var(--bbrd)}
.btn-full{width:100%;padding:10px;font-size:13px}
.btn-sm{padding:3px 9px;font-size:11px}
/* print area hidden */
/* Scrollable views */
.sc{flex:1;overflow-y:auto;padding:16px}
/* Cards/rows */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:12px}
.scard{background:var(--bg3);border-radius:var(--rs);padding:11px 14px}
.slbl{font-size:10px;color:var(--text3);font-weight:600;letter-spacing:.4px;text-transform:uppercase;margin-bottom:3px}
.sval{font-size:19px;font-weight:700}
.ssub{font-size:10px;color:var(--text3);margin-top:2px}
.sg3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.sg2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.rb{display:flex;justify-content:space-between;align-items:center}
.mrow{display:flex;justify-content:space-between;align-items:center;padding:8px 11px;border-radius:var(--rs);background:var(--bg3);border:1px solid var(--border);margin-bottom:5px}
.badge{display:inline-block;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:600}
.bg{background:var(--gbg);color:var(--grn)}
.ba{background:var(--abg);color:var(--amb)}
.br{background:var(--rbg);color:var(--red)}
.aw{padding:9px 12px;border-radius:var(--rs);font-size:12px;margin-bottom:10px;background:var(--abg);color:var(--amb);border:1px solid var(--abrd)}
.stitle{font-size:14px;font-weight:700;margin-bottom:12px}
.fg label{display:block;font-size:11px;color:var(--text2);margin-bottom:3px;font-weight:600}
.fg input,.fg select{width:100%;padding:7px 9px;border-radius:var(--rs);border:1.5px solid var(--border);background:var(--bg2);color:var(--text);font-size:12px;font-family:inherit;outline:none}
.fg input:focus,.fg select:focus{border-color:var(--acc)}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.barchart{display:flex;align-items:flex-end;gap:5px;height:80px;padding:4px 0}
.bw{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px}
.bar{width:100%;background:#c8a96e;border-radius:3px 3px 0 0;min-height:2px}
.bar.td{background:var(--acc)}
.bv{font-size:9px;color:var(--text3)}
.bl{font-size:9px;color:var(--text3)}

@media(max-width:768px){
  body{font-size:15px}
  #pos-wrap{flex-direction:column}
  #scol{min-height:40vh}
  #opanel{width:100%!important;min-width:100%!important;max-height:55vh;border-left:none;border-top:2px solid var(--acc)}
  #mesa-strip{padding:8px;gap:8px}
  .mchip{min-width:72px;padding:10px 8px;font-size:13px}
  .ctab{padding:8px 14px;font-size:13px}
  .rrow{padding:12px 10px}
  .rrow .rn{font-size:14px}
  #si{font-size:16px;padding:11px 10px 11px 32px}
  .payb{padding:13px 8px;font-size:14px}
  .btn{font-size:14px;padding:11px}
  .qb{width:32px;height:32px;font-size:18px}
  nav button{padding:11px 14px;font-size:14px}
  .oi{padding:10px 8px}
  .oinn{font-size:13px}
}
@media(max-width:540px){.sg3{grid-template-columns:1fr 1fr}}
#cancel-modal{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:200}
.cancel-box{background:#fff;border-radius:10px;padding:24px;width:320px;max-width:90vw}
#pin-screen{position:fixed;inset:0;background:#f8f6f1;display:flex;align-items:center;justify-content:center;z-index:9999}
.pin-box{background:#fff;border:1px solid #ddd8ce;border-radius:10px;padding:32px 28px;width:300px;max-width:90vw;text-align:center}
.pin-logo{font-size:20px;font-weight:700;color:#5c4a2a;margin-bottom:4px}
.pin-sub{font-size:12px;color:#999;margin-bottom:24px}
.pin-dots{display:flex;gap:12px;justify-content:center;margin-bottom:24px}
.pin-dot{width:14px;height:14px;border-radius:50%;background:#f0ede6;border:2px solid #c8c2b5;transition:all .15s}
.pin-dot.filled{background:#5c4a2a;border-color:#5c4a2a}
.pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:8px}
.pin-btn{height:54px;border-radius:8px;border:1px solid #ddd8ce;background:#f0ede6;font-size:22px;font-weight:500;cursor:pointer;color:#1a1a1a;font-family:inherit;transition:all .1s}
.pin-btn:hover{background:#ede5d0;border-color:#5c4a2a}
.pin-btn:active{transform:scale(.95)}
.pin-error{font-size:12px;color:#8b1a1a;margin-top:10px;min-height:16px;font-weight:500}
</style>
</head>
<body>
<div id="loading"><div class="spin"></div><div style="font-size:12px;color:#999;margin-top:8px">Cargando La Madriguera...</div></div>
<div id="app">
  <header>
    <div class="logo">La Madriguera</div>
    <div id="hinfo"><div class="dot" id="cdot"></div><span id="hturno" style="color:var(--acc);font-weight:600"></span><span id="htime"></span></div>
  </header>
  <div id="tbar"></div>
  <nav>
    <button class="active" data-v="pos">POS</button>
    <button data-v="productos">Productos</button>
    <button data-v="dashboard">Dashboard</button>
    <button data-v="caja">Caja</button>
    <button data-v="inventario">Inventario</button>
    <button data-v="reportes">Reportes</button>
    <button data-v="monitor">Monitor</button>
    <button data-v="devoluciones">Devoluciones</button>
    <button data-v="facturas">Facturas</button>
    <button data-v="clientes">Clientes</button>
  </nav>
  <div id="mc"></div>
</div>
<div id="print-area"></div>

<div id="cancel-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:9998;align-items:center;justify-content:center;padding:16px">
  <div style="background:#fff;border-radius:12px;padding:20px;width:100%;max-width:320px;box-shadow:0 4px 24px rgba(0,0,0,.3)">
    <div style="font-size:14px;font-weight:700;color:#8b1a1a;margin-bottom:8px">Cancelar ítem enviado</div>
    <div id="cancel-item-name" style="font-size:12px;margin-bottom:14px;color:#444;background:#fde8e8;padding:8px 10px;border-radius:7px;line-height:1.4"></div>
    <div style="font-size:11px;font-weight:700;margin-bottom:8px;color:#555;text-transform:uppercase;letter-spacing:.3px">Selecciona el motivo</div>
    <div style="display:flex;flex-direction:column;gap:6px;margin-bottom:10px">
      <button class="cm-btn" data-m="Error en el pedido" style="text-align:left;padding:10px 12px;border-radius:7px;border:1.5px solid #ddd;background:#f8f8f8;font-size:12px;cursor:pointer;font-family:inherit;transition:all .1s">Error en el pedido</button>
      <button class="cm-btn" data-m="Cliente cambió de opinión" style="text-align:left;padding:10px 12px;border-radius:7px;border:1.5px solid #ddd;background:#f8f8f8;font-size:12px;cursor:pointer;font-family:inherit;transition:all .1s">Cliente cambió de opinión</button>
      <button class="cm-btn" data-m="Producto no disponible" style="text-align:left;padding:10px 12px;border-radius:7px;border:1.5px solid #ddd;background:#f8f8f8;font-size:12px;cursor:pointer;font-family:inherit;transition:all .1s">Producto no disponible</button>
      <button class="cm-btn" data-m="Otro" style="text-align:left;padding:10px 12px;border-radius:7px;border:1.5px solid #ddd;background:#f8f8f8;font-size:12px;cursor:pointer;font-family:inherit;transition:all .1s">Otro motivo...</button>
    </div>
    <div id="cancel-otro-div" style="display:none;margin-bottom:10px">
      <input id="cancel-obs" placeholder="Escribe el motivo..." style="width:100%;padding:8px 10px;border-radius:7px;border:1.5px solid #ddd;font-size:12px;font-family:inherit">
    </div>
    <div style="display:flex;gap:7px">
      <button id="cancel-no-btn" style="flex:1;padding:10px;border-radius:8px;border:1.5px solid #ddd;background:#f5f5f5;font-size:12px;cursor:pointer;font-family:inherit">Mantener</button>
      <button id="cancel-si-btn" style="flex:1;padding:10px;border-radius:8px;border:none;background:#fde8e8;color:#8b1a1a;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;opacity:.4;pointer-events:none">Confirmar</button>
    </div>
  </div>
</div>
<div id="factura-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:9990;align-items:center;justify-content:center;padding:16px">
  <div style="background:#fff;border-radius:12px;padding:20px;width:100%;max-width:360px;max-height:90vh;overflow-y:auto">
    <div style="font-size:15px;font-weight:700;color:#1a3f8b;margin-bottom:4px">🧾 Datos para factura</div>
    <div id="fac-venta-info" style="font-size:11px;color:#999;margin-bottom:14px"></div>
    <!-- Buscador de cliente frecuente -->
    <div style="position:relative;margin-bottom:14px">
      <label style="font-size:11px;font-weight:700;color:#555;display:block;margin-bottom:4px">Buscar cliente frecuente</label>
      <div style="position:relative">
        <input id="fac-buscar" placeholder="Nombre, cédula, RUC o correo..." autocomplete="off"
          style="width:100%;padding:9px 10px 9px 32px;border-radius:7px;border:1.5px solid #93c5fd;font-size:13px;font-family:inherit;outline:none;background:#f0f7ff">
        <span style="position:absolute;left:9px;top:50%;transform:translateY(-50%);font-size:14px;opacity:.5">🔍</span>
      </div>
      <div id="fac-sugerencias" style="display:none;position:absolute;left:0;right:0;background:#fff;border:1.5px solid #93c5fd;border-top:none;border-radius:0 0 8px 8px;z-index:10;max-height:180px;overflow-y:auto;box-shadow:0 4px 12px rgba(0,0,0,.1)"></div>
    </div>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
      <div style="flex:1;height:1px;background:#eee"></div>
      <span style="font-size:11px;color:#aaa">o ingresa manualmente</span>
      <div style="flex:1;height:1px;background:#eee"></div>
    </div>
    <div style="display:flex;flex-direction:column;gap:10px;margin-bottom:14px">
      <div>
        <label style="font-size:11px;font-weight:700;color:#555;display:block;margin-bottom:5px">Tipo de identificación</label>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">
          <button class="fac-tipo-btn" data-tipo="Cédula" style="padding:8px;border-radius:7px;border:1.5px solid #ddd;background:#f8f8f8;font-size:12px;cursor:pointer;font-family:inherit">Cédula</button>
          <button class="fac-tipo-btn" data-tipo="RUC" style="padding:8px;border-radius:7px;border:1.5px solid #ddd;background:#f8f8f8;font-size:12px;cursor:pointer;font-family:inherit">RUC</button>
          <button class="fac-tipo-btn" data-tipo="Pasaporte" style="padding:8px;border-radius:7px;border:1.5px solid #ddd;background:#f8f8f8;font-size:12px;cursor:pointer;font-family:inherit">Pasaporte</button>
          <button class="fac-tipo-btn" data-tipo="Consumidor Final" style="padding:8px;border-radius:7px;border:1.5px solid #ddd;background:#f8f8f8;font-size:12px;cursor:pointer;font-family:inherit">Consumidor Final</button>
        </div>
      </div>
      <div id="fac-num-div">
        <label style="font-size:11px;font-weight:700;color:#555;display:block;margin-bottom:4px">Número de cédula / RUC / Pasaporte</label>
        <input id="fac-num" placeholder="Ej: 0912345678" style="width:100%;padding:9px 10px;border-radius:7px;border:1.5px solid #ddd;font-size:13px;font-family:inherit;outline:none">
      </div>
      <div>
        <label style="font-size:11px;font-weight:700;color:#555;display:block;margin-bottom:4px">Nombre / Razón social</label>
        <input id="fac-nombre" placeholder="Nombre completo o razón social" style="width:100%;padding:9px 10px;border-radius:7px;border:1.5px solid #ddd;font-size:13px;font-family:inherit;outline:none">

<script>
// ── PIN de acceso ─────────────────────────────────────────────
// ▼ CAMBIA ESTE PIN ▼
const CORRECT_PIN = '2025';
// ▲ CAMBIA ESTE PIN ▲
const PIN_SESSION_KEY = 'madu_pin_ok';
const PIN_EXPIRY_KEY = 'madu_pin_exp';
const PIN_EXPIRY_HOURS = 12;

(function initPIN(){
  // Check valid session
  var ok = sessionStorage.getItem(PIN_SESSION_KEY);
  var exp = sessionStorage.getItem(PIN_EXPIRY_KEY);
  if(ok==='1' && exp && Date.now() < parseInt(exp)){
    document.getElementById('pin-screen').style.display='none';
    return;
  }
  // Show PIN screen explicitly
  document.getElementById('pin-screen').style.display='flex';
  let entered='';
  const dots=[0,1,2,3].map(i=>document.getElementById('d'+i));
  const errEl=document.getElementById('pin-error');

  function updateDots(){
    dots.forEach((d,i)=>d.classList.toggle('filled', i<entered.length));
  }
  function shake(){
    const box=document.querySelector('.pin-box');
    let n=0;
    const iv=setInterval(()=>{
      box.style.transform='translateX('+(n%2===0?-7:7)+'px)';
      n++;if(n>7){clearInterval(iv);box.style.transform='';}
    },50);
  }
  function tryPIN(){
    if(entered===CORRECT_PIN){
      sessionStorage.setItem(PIN_SESSION_KEY,'1');
      sessionStorage.setItem(PIN_EXPIRY_KEY, String(Date.now()+PIN_EXPIRY_HOURS*3600000));
      document.getElementById('pin-screen').style.display='none';
    } else {
      shake();
      errEl.textContent='PIN incorrecto. Intenta de nuevo.';
      entered='';
      updateDots();
      setTimeout(()=>errEl.textContent='',2500);
    }
  }
  document.querySelectorAll('.pin-btn').forEach(function(btn){
    btn.addEventListener('click',function(){
      var n=btn.dataset.n;
      if(n==='back'){ entered=entered.slice(0,-1); }
      else if(n==='ok'){ if(entered.length===4) tryPIN(); }
      else if(entered.length<4){ entered+=n; }
      updateDots();
      errEl.textContent='';
      if(entered.length===4 && n!=='ok' && n!=='back') setTimeout(tryPIN,200);
    });
  });
})();
</script>

// ── Realtime ─────────────────────────────────────────────────
let _appShown=false;
function showApp(){
  if(_appShown)return;
  _appShown=true;
  online=true;
  const ldg=document.getElementById('loading');
  const app=document.getElementById('app');
  const cdot=document.getElementById('cdot');
  if(ldg)ldg.style.display='none';
  if(app)app.style.display='flex';
  if(cdot)cdot.classList.add('on');
  render();
}

function subRT(){
  let _loaded={};
  let _renderTimer=null;
  function debouncedRender(){
    // Only re-render views that need live data
    if(!_appShown) return;
    if(_renderTimer) clearTimeout(_renderTimer);
    _renderTimer=setTimeout(function(){
      if(view==='dashboard'||view==='monitor'||view==='caja'){
        render();
      } else if(view==='pos'){
        // For POS, only update order panel if no user is actively interacting
        if(!cobConf&&!splitMode&&!personaMode){
          render();
        }
      }
    }, 400);
  }

  ['products','tables','sales','clientes'].forEach(k=>{
    onSnapshot(doc(db,'madu',k),snap=>{
      if(snap.exists()){
        if(k==='products'){P=snap.data().v||[];setTimeout(patchProducts,3000);}
        if(k==='tables')T=snap.data().v||[];
        if(k==='sales')S=snap.data().v||[];
        if(k==='clientes')CL=snap.data().v||[];
      }
      _loaded[k]=true;
      if(_loaded['tables']&&_loaded['sales']){
        showApp();
      }
      // After initial load, only re-render passively (tables/sales changes from other devices)
      if(_appShown&&!_writing) debouncedRender();
    },()=>{online=false;showErr();});
  });
  // Fallback: show app after 4 seconds no matter what
  setTimeout(function(){ showApp(); }, 4000);
}

  document.getElementById('loading').innerHTML=`<div style="text-align:center;padding:28px;max-width:440px">

      2. Copiar firebaseConfig al HTML (reemplazar TU_...)<br>
      3. Firestore Database → Crear → modo producción<br>
      4. Firestore → Reglas → allow read, write: if true → Publicar
    </div>
  </div>`;
}

    const s=tb.status,sel=tb.id===selT;
    const tbT=tb.order.reduce((a,i)=>a+i.price*i.qty,0);
    return `<button class="mchip ${s}${sel?' sel':''}" data-tid="${tb.id}">
      ${tb.name}${s!=='libre'?`<br><span style="font-size:10px">${fmt(tbT)}</span>`:''}
    </button>`;
  }).join('');

  // Category tabs
  const cats=['Todos','Café','Bebidas','Bubble Tea','Platos fuertes','Postres','Bebidas con alcohol','Taller & Merch','Libros'];
  const ctabs=cats.map(c=>`<button class="ctab${scat===c?' on':''}" data-cat="${c}">${c}</button>`).join('');

  // Filter products
  let filtered=active;
  if(scat!=='Todos') filtered=filtered.filter(p=>p.category===scat);
  if(sq.trim()){
    const q=sq.trim().toLowerCase();
    filtered=filtered.filter(p=>
      p.name.toLowerCase().includes(q)||
      (p.code&&p.code.toLowerCase().includes(q))||
      (p.author&&p.author.toLowerCase().includes(q))||
      (p.subcategory&&p.subcategory.toLowerCase().includes(q))
    );
  }

  const rows=filtered.length===0
    ?`<div class="nores">Sin resultados${sq?` para "${sq}"`:''}</div>`
    :filtered.map(p=>{
      const [bg,tx]=(CAT_COLORS[p.category]||'#f0ede6|#666').split('|');
      const meta=p.category==='Libros'
        ?[p.author,p.code].filter(Boolean).join(' · ')
        :[p.subcategory,p.hasVariants?'variante':'',p.stockControl==='unidad'&&p.stock<=5?`⚠ ${p.stock} uds`:''].filter(Boolean).join(' · ');
      return `<div class="rrow" data-pid="${p.id}">
        <div style="flex:1;min-width:0">
          <div class="rn">${p.name}${p.hasVariants?'<span style="font-size:9px;color:var(--amb);margin-left:4px">▾</span>':''}</div>
          <div class="rm"><span class="rcbadge" style="background:${bg};color:${tx}">${p.category}</span>${meta}</div>
        </div>
        <span class="rp">${fmt(p.price)}</span>
        <button class="radd" data-pid="${p.id}">+</button>
      </div>`;
    }).join('');

  // Variant panel
  const vp=vtarget?P.find(x=>x.id===vtarget):null;
  const varHTML=vp?`<div id="vpanel" class="show">
    <div class="vttl">${vp.name}</div>
    <div class="vgrp"><div class="vlbl">Tamaño</div><div class="vopts">${SIZES.map(s=>`<button class="vopt${vsize===s?' on':''}" data-vs="${s}">${s}</button>`).join('')}</div></div>
    <div class="vgrp"><div class="vlbl">Leche</div><div class="vopts">${MILKS.map(m=>`<button class="vopt${vmilk===m?' on':''}" data-vm="${m}">${m}</button>`).join('')}</div></div>
    <div class="vact"><button class="btn btn-g btn-sm" id="bvc">Cancelar</button><button class="btn btn-ok" style="flex:1;padding:7px" id="bva">+ Agregar al pedido</button></div>
  </div>`:'<div id="vpanel"></div>';

  // Split totals
  const splitTotal=splitMode?Object.entries(splitItems).reduce((a,[lid,qty])=>{
    const it=t?.order.find(i=>i.lid===lid);return a+(it?it.price*qty:0);
  },0):0;

  // Order items
  const items=t&&t.order.length>0
    ?t.order.map(i=>{
      const wasSent=t.comandas&&t.comandas.length>0&&t.comandas.some(cmd=>cmd.items&&cmd.items.some(ci=>ci.lid===i.lid));
      const selQty=splitMode?(splitItems[i.lid]||0):0;
      const hasAny=splitMode&&selQty>0;
      const pTag=i.persona
        ?`<span style="font-size:10px;background:var(--acc);color:#fff;border-radius:8px;padding:2px 7px;margin-left:5px;font-weight:700">P${i.persona}</span>`
        :(personaMode?`<span style="font-size:9px;background:#fef3c7;color:#92400e;border-radius:8px;padding:2px 6px;margin-left:4px;border:1px solid #fcd34d;font-weight:600">Sin asignar</span>`:'');
      const itemTapStyle=personaMode&&!splitMode?'cursor:pointer;':'';
      const itemTapHint=personaMode&&!splitMode&&!i.persona?'border-left:3px solid #fcd34d;padding-left:8px;':'';
      return `<div class="oi" style="${splitMode&&!hasAny?'opacity:.45':''}${hasAny?'background:var(--acl);border-radius:var(--rs);':''}${itemTapHint}" data-assign-lid="${i.lid}">
        <div class="oin">
          <div class="oinn">${i.name}${pTag}${personaMode&&!splitMode?`<span style="font-size:9px;color:var(--text3);margin-left:4px">${i.persona?'':'← toca para asignar'}</span>`:''}</div>
          ${i.variant?`<div class="oiv">${i.variant}</div>`:''}
        </div>
        ${splitMode?`<div style="display:flex;align-items:center;gap:5px;flex-shrink:0">
            <button class="qb" data-sp="${i.lid}" data-sd="-1" style="${selQty===0?'opacity:.3':''}">−</button>
            <span style="font-size:12px;font-weight:700;min-width:22px;text-align:center;color:${hasAny?'var(--acc)':'var(--text3)'}">
              ${selQty}/${i.qty}
            </span>
            <button class="qb" data-sp="${i.lid}" data-sd="1" style="${selQty>=i.qty?'opacity:.3':''}">+</button>
          </div>
          <span style="font-size:12px;font-weight:700;min-width:46px;text-align:right;color:${hasAny?'var(--acc)':'var(--text3)'}">
            ${hasAny?fmt(i.price*selQty):fmt(i.price*i.qty)}
          </span>`
        :`<div class="oic">
            ${wasSent?'':`<button class="qb" data-qp="${i.lid}" data-d="-1">−</button>`}
            <span style="font-size:12px;font-weight:700;min-width:15px;text-align:center">${i.qty}</span>
            ${wasSent?'':`<button class="qb" data-qp="${i.lid}" data-d="1">+</button>`}
            ${wasSent?`<button class="qb" style="background:var(--rbg);border-color:var(--rbrd);color:var(--red);font-size:12px" data-cancelitem="${i.lid}">✕</button>`:''}
          </div>
          <span class="oip">${fmt(i.price*i.qty)}</span>`}
      </div>`;
    }).join('')
    :`<div class="oempty">${t?'Busca y agrega productos →':'← Selecciona una mesa'}</div>`;

  // Footer: comanda or cobro
  let ftr='';
  if(t&&t.order.length>0){
    const yaEnviado=t.status==='enviada'||t.status==='cobrar';
    if(!cobConf && !splitMode){
      if(personaMode){
        // Build per-person summary
        const personaResumen=Array.from({length:numPersonas},(_,pi)=>{
          const pItems=t.order.filter(i=>i.persona===pi+1);
          const pTot=pItems.reduce((a,i)=>a+i.price*i.qty,0);
          return {num:pi+1,items:pItems,total:pTot,hasItems:pItems.length>0};
        });
        const sinAsignar=t.order.filter(i=>!i.persona);
        const totSinAsignar=sinAsignar.reduce((a,i)=>a+i.price*i.qty,0);
        ftr=`<div id="oftr">
          <div style="font-size:11px;font-weight:700;color:var(--text2);margin-bottom:8px">Cobrar por persona</div>
          ${personaResumen.map(p=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:7px 10px;margin-bottom:5px;border-radius:var(--rs);background:${p.hasItems?'var(--bg3)':'var(--bg)'};border:1px solid ${p.hasItems?'var(--border)':'transparent'};">
            <div>
              <span style="font-weight:700;font-size:12px">Persona ${p.num}</span>
              ${p.hasItems?`<span style="font-size:10px;color:var(--text3);margin-left:6px">${p.items.map(i=>i.qty+'× '+i.name).join(', ')}</span>`:`<span style="font-size:10px;color:var(--text3);margin-left:6px">sin ítems</span>`}
            </div>
            ${p.hasItems?`<button class="btn btn-ok btn-sm" style="flex-shrink:0" data-cobrar-persona="${p.num}">Cobrar ${fmt(p.total)}</button>`:`<span style="font-size:11px;color:var(--text3)">—</span>`}
          </div>`).join('')}
          ${sinAsignar.length>0?`<div style="padding:7px 10px;margin-bottom:5px;border-radius:var(--rs);background:var(--abg);border:1px solid var(--abrd)">
            <span style="font-size:11px;font-weight:700;color:var(--amber)">Sin asignar:</span>
            <span style="font-size:10px;color:var(--amber);margin-left:6px">${sinAsignar.map(i=>i.qty+'× '+i.name).join(', ')} · ${fmt(totSinAsignar)}</span>
          </div>`:''}
          <div style="border-top:1px solid var(--border);padding-top:8px;margin-top:4px;display:flex;gap:6px">
            <button class="btn btn-b btn-sm" id="bcomanda" style="flex:1">${yaEnviado?'+ Comanda':'Comanda'}</button>
            <button class="btn" style="flex:1;padding:9px;font-size:11px;background:#dbeafe;color:#1a3f8b;border:1px solid #93c5fd" id="bfactura">🧾 Factura</button>
            <button class="btn btn-ok" style="flex:2;padding:9px" id="bcobrar">Cobrar todo ${fmt(tot)}</button>
          </div>
        </div>`;
      } else {
        ftr=`<div id="oftr">
          <div class="tot"><span>Total</span><span>${fmt(tot)}</span></div>
          <div style="display:flex;gap:6px;margin-bottom:6px">
            <button class="btn btn-b" style="flex:1;font-size:11px" id="bcomanda">${yaEnviado?'+ Comanda':'Enviar comanda'}</button>
            <button class="btn btn-ok" style="flex:1" id="bcobrar">Cobrar ${fmt(tot)}</button>
          </div>
          <div style="display:flex;gap:6px;margin-top:5px">
            <button class="btn btn-g" style="flex:1;font-size:11px" id="bsplit">Cobro parcial</button>
            <button class="btn" style="flex:1;font-size:11px;background:#dbeafe;color:#1a3f8b;border:1px solid #93c5fd;font-weight:600" id="bfactura">🧾 Factura</button>
          </div>
        </div>`;
      }
    } else if(splitMode){
      const hasSplit=Object.values(splitItems).some(q=>q>0);
      ftr=`<div id="oftr">
        <div style="font-size:11px;color:var(--text3);margin-bottom:8px">Selecciona qué ítems cobrar ahora</div>
        ${hasSplit?`<div style="display:flex;justify-content:space-between;font-weight:700;font-size:15px;margin-bottom:10px;padding:8px 10px;background:var(--acl);border-radius:var(--rs)">
          <span>A cobrar ahora</span><span style="color:var(--acc)">${fmt(splitTotal)}</span>
        </div>`:''}
        <div class="pgrid" style="margin-bottom:8px">${PAY.map(m=>`<button class="payb${selPay===m?' on':''}" data-pay="${m}">${m}</button>`).join('')}</div>
        <div style="display:flex;gap:6px">
          <button class="btn btn-g btn-sm" id="bcancelsplit">Cancelar</button>
          <button class="btn btn-ok" style="flex:2;padding:9px;${!hasSplit?'opacity:.4;cursor:not-allowed':''}" id="bconfsplit" data-disabled="${hasSplit?'0':'1'}">
            ✓ Cobrar ${hasSplit?fmt(splitTotal):'selecciona ítems'}
          </button>
        </div>
      </div>`;
    } else if(modoParcial){
      ftr='<div id="oftr"></div>';
    } else {
      ftr=`<div id="oftr">
        <div class="tot"><span>Total</span><span>${fmt(tot)}</span></div>
        <div style="font-size:11px;font-weight:700;margin-bottom:7px">Método de pago</div>
        <div class="pgrid">${PAY.map(m=>`<button class="payb${selPay===m?' on':''}" data-pay="${m}">${m}</button>`).join('')}</div>
        <div style="display:flex;gap:6px;margin-bottom:7px">
          <button class="btn btn-g btn-sm" id="bccc">Atrás</button>
          <button class="btn btn-ok" style="flex:2;padding:9px" id="bconf">✓ Confirmar pago</button>
        </div>
        <button class="btn btn-g btn-full" style="font-size:11px" id="bparcial">Dividir pago en varios métodos</button>
      </div>`;
    }
  }

  return `<div style="display:flex;flex-direction:column;height:100%;overflow:hidden;min-height:0">
    <div id="mesa-strip">${chips}</div>
    <div id="pos-wrap">
      <div id="scol">
        <div id="stop">
          <div class="swr" style="display:flex;gap:6px;align-items:center">
            <div style="position:relative;flex:1">
              <span class="sic">🔍</span>
              <input id="si" type="text" placeholder="Buscar nombre, ISBN, autor o escanea código..." value="${sq}" autocomplete="off" autocorrect="off">
            </div>
            <button id="bscan" title="Escanear código de barras" style="padding:8px 10px;border-radius:var(--rs);border:1.5px solid var(--b2);background:var(--bg3);cursor:pointer;font-size:16px;flex-shrink:0;line-height:1" >📷</button>
          </div>
          <div id="ctabs">${ctabs}</div>
        </div>
        <div id="results">${rows}</div>
        ${varHTML}
      </div>
      <div id="opanel">
        <div id="ohdr">
          <span id="omesa">${t?t.name:'Sin mesa'}</span>
          <div style="display:flex;gap:5px;align-items:center">
            ${t&&t.order.length>0?`<button class="btn btn-sm" id="breimprimir" title="Reimprimir comanda" style="background:var(--bg3);border:1px solid var(--border);color:var(--text2);font-size:13px;padding:4px 8px">🖨</button>`:''}
            ${t&&t.order.length>0?`<button class="btn btn-sm" id="bpersona" style="background:${personaMode?'#5c4a2a':'var(--bg3)'};border:1px solid ${personaMode?'#5c4a2a':'var(--border)'};color:${personaMode?'#fff':'var(--text2)'};font-size:13px;padding:4px 8px">👥</button>`:''}
            ${t?`<button class="btn btn-g btn-sm" id="bcm">✕</button>`:''}
          </div>
        </div>
        ${personaMode&&t?`<div style="background:#ede5d0;padding:8px 12px;border-bottom:1px solid #d4c4a0">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:7px">
            <span style="font-size:11px;font-weight:700;color:#5c4a2a">Mesa compartida — ${numPersonas} personas</span>
            <div style="display:flex;gap:5px">
              <button id="baddpersona" style="padding:2px 8px;border-radius:12px;font-size:11px;cursor:pointer;border:1px solid #c8c2b5;background:#fff;color:#555;font-family:inherit">+ Persona</button>
              <button id="bcancelpersona" style="padding:2px 8px;border-radius:12px;font-size:11px;cursor:pointer;border:1px solid #c8c2b5;background:#fff;color:#8b1a1a;font-family:inherit">✕ Salir</button>
            </div>
          </div>
          <div style="display:flex;gap:5px;flex-wrap:wrap">
            ${Array.from({length:numPersonas},(_,pi)=>{
              const isA=personaActual===pi+1;
              const cnt=t.order.filter(oi=>oi.persona===pi+1).length;
              const ptot=t.order.filter(oi=>oi.persona===pi+1).reduce((a,oi)=>a+oi.price*oi.qty,0);
              return `<button data-persona="${pi+1}" style="padding:5px 10px;border-radius:20px;font-size:11px;cursor:pointer;border:1.5px solid ${isA?'#5c4a2a':'#c8c2b5'};background:${isA?'#5c4a2a':'#fff'};color:${isA?'#fff':'#555'};font-family:inherit;line-height:1.3;font-weight:${isA?700:400}">P${pi+1}${cnt>0?'<br><span style=\'font-size:9px;opacity:.85\'> '+fmt(ptot)+'</span>':''}</button>`;
            }).join('')}
          </div>
        </div>`:''}
        <div id="oitems">${items}</div>
        ${ftr}
      </div>
    </div>
  </div>`;
}

function attachPOS(){
  const mc=document.getElementById('mc');

  // Mesas
  mc.querySelectorAll('.mchip').forEach(el=>el.addEventListener('click',()=>{
    selT=selT===el.dataset.tid?null:el.dataset.tid;cobConf=false;vtarget=null;splitMode=false;splitItems={};pagosParciales=[];modoParcial=false;personaMode=false;render();
  }));
  mc.querySelector('#bcm')?.addEventListener('click',()=>{selT=null;cobConf=false;itemSel=null;pagosParciales=[];modoParcial=false;splitMode=false;splitItems={};render();});

  // Search
  const si=document.getElementById('si');
  if(si){
    si.addEventListener('input',e=>{sq=e.target.value;rResults();});
    si.addEventListener('keydown',e=>{if(e.key==='Escape'){sq='';si.value='';rResults();}});
    setTimeout(()=>si.focus&&si.focus(),100);
  }

  // Cat tabs
  mc.querySelectorAll('.ctab').forEach(el=>el.addEventListener('click',()=>{scat=el.dataset.cat;rResults();}));

  // Add product (+ button)
  mc.querySelectorAll('.radd').forEach(el=>el.addEventListener('click',async e=>{
    e.stopPropagation();
    if(!selT){alert('Selecciona una mesa primero');return;}
    const p=P.find(x=>x.id===el.dataset.pid);if(!p)return;
    if(p.hasVariants){vtarget=p.id;vsize='Mediano';vmilk='Entera';rVPanel();}
    else await addItem(p,null);
  }));

  // Row click (excluding + button)
  mc.querySelectorAll('.rrow').forEach(el=>el.addEventListener('click',async e=>{
    if(e.target.classList.contains('radd')||e.target.closest('.radd'))return;
    if(!selT){alert('Selecciona una mesa primero');return;}
    const p=P.find(x=>x.id===el.dataset.pid);if(!p)return;
    if(p.hasVariants){vtarget=p.id;vsize='Mediano';vmilk='Entera';rVPanel();}
    else await addItem(p,null);
  }));

  // Variants
  rVPanelEvents();

  // Qty (only for +/- buttons, not cancel X)
  mc.querySelectorAll('.qb:not([data-cancelitem])').forEach(el=>el.addEventListener('click',()=>{
    if(el.dataset.cancelitem||el.dataset.sp)return;
    const t=T.find(x=>x.id===selT);if(!t)return;
    const it=t.order.find(i=>i.lid===el.dataset.qp);if(!it)return;
    it.qty+=parseInt(el.dataset.d);t.order=t.order.filter(i=>i.qty>0);
    if(t.order.length===0){t.status='libre';t.comandas=[];}
    render();
    sT();
  }));

  // Populate footer via rFooter when in cobro mode
  if(cobConf || modoParcial) rFooter();

  // Comanda
  mc.querySelector('#bcomanda')?.addEventListener('click',()=>{enviarComanda();});

  // Cobro
  mc.querySelector('#bcobrar')?.addEventListener('click',()=>{cobConf=true;modoParcial=false;pagosParciales=[];itemSel=null;render();});
  mc.querySelector('#bscan')?.addEventListener('click',()=>openScanner());
  mc.querySelector('#bfactura')?.addEventListener('click',()=>{
    const t=T.find(x=>x.id===selT);
    const ref=t?{mesa:t.name,total:t.order.reduce((a,i)=>a+i.price*i.qty,0),items:t.order.map(i=>({...i}))}:null;
    window.openFacturaModal(ref);
  });
  mc.querySelector('#bccc')?.addEventListener('click',()=>{cobConf=false;modoParcial=false;pagosParciales=[];itemSel=null;render();});
  mc.querySelector('#bpersona')?.addEventListener('click',()=>{personaMode=!personaMode;if(!personaMode){personaActual=1;}render();});
  mc.querySelector('#breimprimir')?.addEventListener('click',()=>{
    const t=T.find(x=>x.id===selT);if(!t||t.order.length===0)return;
    // Reprint full comanda grouped by item
    const grouped={};
    t.order.forEach(i=>{
      const key=(i.name+(i.variant?'|'+i.variant:'')).toLowerCase();
      if(!grouped[key])grouped[key]={name:i.name,variant:i.variant||null,qty:0};
      grouped[key].qty+=i.qty;
    });
    imprimirComanda(Object.values(grouped), t.name, false);
  });

  // Tap item to assign persona
  if(personaMode){
    mc.querySelectorAll('[data-assign-lid]').forEach(el=>{
      el.addEventListener('click',async e=>{
        // Don't trigger when clicking +/- or X buttons
        if(e.target.closest('.qb')||e.target.closest('[data-cancelitem]')) return;
        const t=T.find(x=>x.id===selT);if(!t)return;
        const it=t.order.find(i=>i.lid===el.dataset.assignLid);if(!it)return;
        // If item already has this persona, remove assignment
        if(it.persona===personaActual){
          it.persona=null;
          // Update lid to remove persona suffix
          it.lid=it.productId+'_'+(it.variant||'base');
        } else {
          it.persona=personaActual;
          // Update lid to include persona
          it.lid=it.productId+'_'+(it.variant||'base')+'_p'+personaActual;
        }
        render();
        sT();
      });
    });
  }
  mc.querySelector('#baddpersona')?.addEventListener('click',()=>{numPersonas=Math.min(numPersonas+1,15);render();});
  mc.querySelector('#bcancelpersona')?.addEventListener('click',()=>{personaMode=false;render();});
  mc.querySelectorAll('[data-persona]').forEach(el=>el.addEventListener('click',()=>{personaActual=parseInt(el.dataset.persona);render();}));
  mc.querySelector('#bsplit')?.addEventListener('click',()=>{
    splitMode=true;splitItems={};render();
  });

  // Cobrar por persona buttons
  mc.querySelectorAll('[data-cobrar-persona]').forEach(el=>el.addEventListener('click',()=>{
    const pNum=parseInt(el.dataset.cobrarPersona);
    const t=T.find(x=>x.id===selT);if(!t)return;
    // Pre-fill splitItems with this persona's items
    splitItems={};
    t.order.filter(i=>i.persona===pNum).forEach(i=>{splitItems[i.lid]=i.qty;});
    splitMode=true;
    personaActual=pNum;
    render();
  }));

  // ── Cancel sent item (X button) ──────────────────────────────
  mc.querySelectorAll('[data-cancelitem]').forEach(el=>{
    el.addEventListener('click',e=>{
      e.stopPropagation();
      const t=T.find(x=>x.id===selT);if(!t)return;
      const it=t.order.find(i=>i.lid===el.dataset.cancelitem);if(!it)return;
      cancelModal={lid:el.dataset.cancelitem,item:it,table:t};
      // Reset modal
      selectedCancelMotivo='';
      const conf=document.getElementById('btnCancelConfirm');
      if(conf){conf.disabled=true;conf.style.opacity='.4';}
      const otro=document.getElementById('cancel-otro');
      if(otro)otro.style.display='none';
      // Reset button styles
      document.querySelectorAll('#cancel-modal [onclick^="selCancelMotivo"]').forEach(b=>{
        b.style.background='#f8f8f8';b.style.borderColor='#ddd';b.style.color='#333';
      });
      // Show item name
      const nameEl=document.getElementById('cancel-item-name');
      if(nameEl)nameEl.textContent='"'+it.name+'"'+(it.variant?' ('+it.variant+')':'')+' — '+it.qty+' ud'+(it.qty>1?'s':'');
      // Show modal
      const modal=document.getElementById('cancel-modal');
      if(modal){modal.style.display='flex';}
    });
  });
  mc.querySelector('#bcancelsplit')?.addEventListener('click',()=>{splitMode=false;splitItems={};render();});
  // Split qty controls
  mc.querySelectorAll('[data-sp]').forEach(el=>el.addEventListener('click',async()=>{
    const lid=el.dataset.sp; const d=parseInt(el.dataset.sd);
    const t=T.find(x=>x.id===selT); if(!t)return;
    const item=t.order.find(i=>i.lid===lid); if(!item)return;
    const cur=splitItems[lid]||0;
    const nv=Math.min(Math.max(0,cur+d),item.qty);
    if(nv===0) delete splitItems[lid]; else splitItems[lid]=nv;
    render();
  }));
  // Confirm split cobro
  mc.querySelector('#bconfsplit')?.addEventListener('click',async e=>{
    if(e.currentTarget.dataset.disabled==='1') return;
    const t=T.find(x=>x.id===selT); if(!t)return;
    // Build split order
    const splitOrder=[];
    Object.entries(splitItems).forEach(([lid,qty])=>{
      const item=t.order.find(i=>i.lid===lid); if(!item)return;
      splitOrder.push({...item,qty});
    });
    if(splitOrder.length===0) return;
    const splitTot=splitOrder.reduce((a,i)=>a+i.price*i.qty,0);
    // Register sale for split items only
    S.push({id:`s${Date.now()}`,tableId:t.id,tableName:t.name,items:splitOrder,total:splitTot,paymentMethod:selPay,date:new Date().toISOString(),closed:false,user:turnoUser,esParcial:true});
    await sS();
    // Reduce quantities from table order
    Object.entries(splitItems).forEach(([lid,qty])=>{
      const item=t.order.find(i=>i.lid===lid); if(!item)return;
      item.qty-=qty;
    });
    t.order=t.order.filter(i=>i.qty>0);
    // Deduct stock for unit-control products in split
    splitOrder.forEach(i=>{
      if(i.stockControl==='unidad'){
        const p=P.find(x=>x.id===i.productId||x.name===i.name);
        if(p&&p.stock<999) p.stock=Math.max(0,p.stock-i.qty);
      }
    });
    await sP();
    // If no items left, free the table
    if(t.order.length===0){t.status='libre';t.openedAt=null;t.comandas=[];}
    splitMode=false;splitItems={};
    render();
    sT();
    // Print ticket for split
    imprimirTicketSplit(splitOrder, splitTot, t.name);
    splitMode=false; splitItems={}; cobConf=false; modoParcial=false; pagosParciales=[];
    if(t.order.length===0){selT=null;}
    render();
  });
  mc.querySelector('#bparcial')?.addEventListener('click',()=>{modoParcial=true;pagosParciales=[];render();});
  mc.querySelector('#badd-pago')?.addEventListener('click',()=>{
    const inp=document.getElementById('monto-parcial');
    const t2=T.find(x=>x.id===selT);if(!t2)return;
    const tot2=t2.order.reduce((a,i)=>a+i.price*i.qty,0);
    const pendiente=tot2-pagosParciales.reduce((a,x)=>a+x.monto,0);
    const monto=parseFloat(inp?.value)||parseFloat(pendiente.toFixed(2));
    if(monto<=0)return;
    pagosParciales.push({metodo:selPay,monto:Math.min(monto,pendiente)});
    if(inp)inp.value='';
    render();
  });
  mc.querySelectorAll('[data-rp]').forEach(el=>el.addEventListener('click',()=>{
    pagosParciales.splice(parseInt(el.dataset.rp),1);render();
  }));
  mc.querySelectorAll('.payb').forEach(el=>el.addEventListener('click',()=>{selPay=el.dataset.pay;rFooter();}));
  mc.querySelector('#bconf')?.addEventListener('click',async e=>{
    const btn=e.currentTarget;
    if(btn.dataset.disabled==='1'){
      btn.style.transform='translateX(-4px)';
      setTimeout(()=>{btn.style.transform='translateX(4px)';setTimeout(()=>btn.style.transform='',80);},80);
      return;
    }
    await confirmarCobro();
  });

  // Ticket
  mc.querySelector('#bticket')?.addEventListener('click',()=>{
    const t=T.find(x=>x.id===selT);if(t&&t.order.length>0)imprimirTicket(t);
  });
}

async function addItem(p,variant){
  const t=T.find(x=>x.id===selT);if(!t)return;
  // Include persona in lid so each person has separate items
  const persona=personaMode?personaActual:null;
  const lid=p.id+'_'+(variant||'base')+(persona?'_p'+persona:'');
  const ex=t.order.find(i=>i.lid===lid);
  if(ex){ex.qty++;}
  else{t.order.push({lid,productId:p.id,name:p.name,price:p.price,qty:1,variant:variant||null,stockControl:p.stockControl||'sin_control',persona:persona});}
  t.status='ocupada';
  if(!t.openedAt)t.openedAt=new Date().toISOString();
  render(); // instant UI feedback
  sT();     // async write, no await needed here
}

function sanitize(str){
  return String(str||'')
    .replace(/á/g,'a').replace(/é/g,'e').replace(/í/g,'i')
    .replace(/ó/g,'o').replace(/ú/g,'u').replace(/Á/g,'A')
    .replace(/É/g,'E').replace(/Í/g,'I').replace(/Ó/g,'O')
    .replace(/Ú/g,'U').replace(/ñ/g,'n').replace(/Ñ/g,'N')
    .replace(/–/g,'-').replace(/—/g,'--');
}

function printViaIframe(bodyHTML){
  var old=document.getElementById('print-iframe');
  if(old)old.remove();
  var iframe=document.createElement('iframe');
  iframe.id='print-iframe';
  iframe.style.cssText='position:absolute;width:0;height:0;border:0;left:-9999px';
  document.body.appendChild(iframe);
  var doc=iframe.contentWindow.document;
  doc.open();
  doc.write(buildTicketHTML(bodyHTML));
  doc.close();
  setTimeout(function(){
    try{ iframe.contentWindow.focus(); iframe.contentWindow.print(); }
    catch(e){ console.error('Print error:',e); }
    setTimeout(function(){ iframe.remove(); }, 2000);
  }, 500);
}

function enviarComanda(){
  const t=T.find(x=>x.id===selT);if(!t||t.order.length===0)return;
  // Get items NOT yet in any comanda
  const prevItems=new Set((t.comandas||[]).flatMap(c=>c.items.map(i=>i.lid+i.qty)));
  const newItems=t.order.filter(i=>{
    const key=i.lid+i.qty;
    return !prevItems.has(key)||true; // simplified: send all current order as new comanda
  });
  // Actually: send only items added since last comanda
  const lastComandaItems=(t.comandas&&t.comandas.length>0)?t.comandas[t.comandas.length-1].items:[];
  const lcMap={};lastComandaItems.forEach(i=>{lcMap[i.lid]=(lcMap[i.lid]||0)+i.qty;});
  const additional=[];
  t.order.forEach(i=>{
    const prev=lcMap[i.lid]||0;
    if(i.qty>prev) additional.push({...i,qty:i.qty-prev});
  });
  const toSendRaw=t.comandas&&t.comandas.length>0?additional:t.order;
  if(toSendRaw.length===0){alert('No hay nuevos ítems para enviar');return;}
  // GROUP by name+variant and sum quantities for cocina
  const grouped={};
  toSendRaw.forEach(i=>{
    const key=(i.name+(i.variant?'|'+i.variant:'')).toLowerCase();
    if(!grouped[key]) grouped[key]={name:i.name,variant:i.variant||null,qty:0};
    grouped[key].qty+=i.qty;
  });
  const toSend=Object.values(grouped);

  const comanda={id:`c${Date.now()}`,items:t.order.map(i=>({...i})),time:new Date().toISOString(),user:turnoUser};
  if(!t.comandas)t.comandas=[];
  t.comandas.push(comanda);
  t.status='enviada';
  sT();

  // Print comanda
  const now=new Date();
  const html=`
    <div class="center bold" style="font-size:14px;margin-bottom:6px">LA MADRIGUERA</div>
    <div class="center" style="margin-bottom:8px">--- COMANDA DE PRODUCCION ---</div>
    <div>Mesa: <strong>${t.name}</strong></div>
    <div>Hora: ${now.toLocaleTimeString('es-EC',{hour:'2-digit',minute:'2-digit'})}</div>
    <div>Atiende: ${turnoUser}</div>
    <div class="line"></div>
    ${toSend.map(i=>`<div><strong>${i.qty}x ${i.name}</strong>${i.variant?`<br><span style="margin-left:12px;font-size:11px">-> ${i.variant}</span>`:''}</div>`).join('')}
    <div class="line"></div>
  `;
  // Open print window
  const pwc=window.open('','_blank','width=400,height=600');
  if(!pwc){alert('Permite ventanas emergentes en este sitio para imprimir tickets');return;}
  pwc.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><style>
    body{font-family:monospace;font-size:12px;padding:10px;width:80mm}
    .center{text-align:center}.bold{font-weight:bold}.line{border-top:1px dashed #000;margin:8px 0}
  </style></head><body>`+html+`</body></html>`);
  pwc.document.close();
  setTimeout(()=>{pwc.print();},400);
}

async function confirmarCobro(){
  if(cobrando)return; cobrando=true;
  try{
    const t=T.find(x=>x.id===selT);if(!t||t.order.length===0){cobrando=false;return;}
    const total=t.order.reduce((a,i)=>a+i.price*i.qty,0);
    const metodo=modoParcial?pagosParciales.map(p=>p.metodo+' '+fmt(p.monto)).join(' / '):selPay;
    S.push({id:`s${Date.now()}`,tableId:t.id,tableName:t.name,items:t.order.map(i=>({...i})),total,paymentMethod:metodo,pagosParciales:modoParcial?[...pagosParciales]:null,date:new Date().toISOString(),closed:false,user:turnoUser});
    sS();
    // Deduct stock
    t.order.forEach(i=>{
      if(i.stockControl==='unidad'){
        const p=P.find(x=>x.id===i.productId);
        if(p&&p.stock<999)p.stock=Math.max(0,p.stock-i.qty);
      }
    });
    sP();
    // Snapshot before clearing
    const ticketItems=t.order.map(i=>({...i}));
    const ticketTotal=total;
    const ticketMesa=t.name;
    const ticketPay=metodo;
    const ticketTableId=t.id;
    t.order=[];t.status='libre';t.comandas=[];t.openedAt=null;
    cobConf=false;modoParcial=false;pagosParciales=[];splitMode=false;splitItems={};
    selT=null;
    render(); // render immediately before async writes
    imprimirTicketData(ticketItems,ticketTotal,ticketMesa,ticketPay);
    sT(); sS(); // fire and forget - no await
  }catch(err){
    console.error('Error en cobro:',err);
    alert('Error al procesar el cobro. Intenta de nuevo.');
  }finally{
    cobrando=false;
    render();
  }
}

function rResults(){
  const active=P.filter(p=>p.active);
  let filtered=active;
  if(scat!=='Todos')filtered=filtered.filter(p=>p.category===scat);
  if(sq.trim()){
    const q=sq.trim().toLowerCase();
    filtered=filtered.filter(p=>
      p.name.toLowerCase().includes(q)||
      (p.code&&p.code.toLowerCase().includes(q))||
      (p.author&&p.author.toLowerCase().includes(q))||
      (p.subcategory&&p.subcategory.toLowerCase().includes(q))
    );
  }
  const res=document.getElementById('results');if(!res)return;
  if(filtered.length===0){res.innerHTML=`<div class="nores">Sin resultados${sq?` para "${sq}"`:''}</div>`;return;}
  res.innerHTML=filtered.map(p=>{
    const [bg,tx]=(CAT_COLORS[p.category]||'#f0ede6|#666').split('|');
    const meta=p.category==='Libros'
      ?[p.author,p.code].filter(Boolean).join(' · ')
      :[p.subcategory,p.hasVariants?'variante':'',p.stockControl==='unidad'&&p.stock<=5?`⚠ ${p.stock}u`:''].filter(Boolean).join(' · ');
    return `<div class="rrow" data-pid="${p.id}">
      <div style="flex:1;min-width:0"><div class="rn">${p.name}${p.hasVariants?'<span style="font-size:9px;color:var(--amb);margin-left:4px">▾</span>':''}</div>
        <div class="rm"><span class="rcbadge" style="background:${bg};color:${tx}">${p.category}</span>${meta}</div></div>
      <span class="rp">${fmt(p.price)}</span>
      <button class="radd" data-pid="${p.id}">+</button>
    </div>`;
  }).join('');
  // Re-attach
  document.querySelectorAll('.ctab').forEach(el=>{
    el.classList.toggle('on',el.dataset.cat===scat);
    el.onclick=()=>{scat=el.dataset.cat;rResults();};
  });
  res.querySelectorAll('.radd').forEach(el=>el.addEventListener('click',async e=>{
    e.stopPropagation();if(!selT){alert('Selecciona una mesa primero');return;}
    const p=P.find(x=>x.id===el.dataset.pid);if(!p)return;
    if(p.hasVariants){vtarget=p.id;vsize='Mediano';vmilk='Entera';rVPanel();}else await addItem(p,null);
  }));
  res.querySelectorAll('.rrow').forEach(el=>el.addEventListener('click',async e=>{
    if(e.target.classList.contains('radd')||e.target.closest('.radd'))return;
    if(!selT){alert('Selecciona una mesa primero');return;}
    const p=P.find(x=>x.id===el.dataset.pid);if(!p)return;
    if(p.hasVariants){vtarget=p.id;vsize='Mediano';vmilk='Entera';rVPanel();}else await addItem(p,null);
  }));
}

function rFooter(){
  const t=T.find(x=>x.id===selT);if(!t)return;
  const tot=t.order.reduce((a,i)=>a+i.price*i.qty,0);
  const ftr=document.getElementById('oftr');if(!ftr)return;

  if(modoParcial){
    const pendiente=Math.max(0,tot-pagosParciales.reduce((a,x)=>a+x.monto,0));
    const cubierto=pendiente<=0.01;
    ftr.innerHTML=`
      <div class="tot"><span>Total</span><span>${fmt(tot)}</span></div>
      ${pagosParciales.length>0?`<div style="background:var(--bg3);border-radius:var(--rs);padding:8px 10px;margin-bottom:8px">
        ${pagosParciales.map((p,i)=>`<div style="display:flex;justify-content:space-between;align-items:center;font-size:12px;padding:3px 0">
          <span>${p.metodo}</span>
          <div style="display:flex;align-items:center;gap:8px">
            <span style="font-weight:700">${fmt(p.monto)}</span>
            <button class="btn btn-r btn-sm" style="padding:1px 7px;font-size:11px" data-rp="${i}">✕</button>
          </div>
        </div>`).join('')}
        <div style="display:flex;justify-content:space-between;font-size:12px;font-weight:700;padding-top:6px;border-top:.5px solid var(--border2);margin-top:4px;color:${cubierto?'var(--grn)':'var(--red)'}">
          <span>${cubierto?'✓ Cubierto':'Pendiente'}</span>
          <span>${cubierto?'$0.00':fmt(pendiente)}</span>
        </div>
      </div>`:''}
      ${!cubierto?`<div style="font-size:11px;font-weight:700;margin-bottom:6px">Agregar pago (faltan ${fmt(pendiente)})</div>
      <div class="pgrid">${PAY.map(m=>`<button class="payb${selPay===m?' on':''}" data-pay="${m}">${m}</button>`).join('')}</div>
      <div style="display:flex;gap:5px;margin-bottom:8px">
        <input id="monto-parcial" type="number" step="0.01" placeholder="${pendiente.toFixed(2)}" style="flex:1;padding:6px 8px;border-radius:var(--rs);border:1.5px solid var(--b2);font-size:12px;font-family:inherit">
        <button class="btn btn-b btn-sm" id="badd-pago">+ Agregar</button>
      </div>`:''}
      <div style="display:flex;gap:6px">
        <button class="btn btn-g btn-sm" id="bccc">Atrás</button>
        <button class="btn btn-ok" style="flex:2;padding:9px;${cubierto?'':'opacity:.4;cursor:not-allowed'}" id="bconf" data-disabled="${cubierto?'0':'1'}">✓ Confirmar pago</button>
      </div>`;
    // Attach events
    ftr.querySelectorAll('.payb').forEach(el=>el.addEventListener('click',()=>{selPay=el.dataset.pay;rFooter();}));
    ftr.querySelector('#badd-pago')?.addEventListener('click',()=>{
      const inp=document.getElementById('monto-parcial');
      const monto=parseFloat(inp?.value)||pendiente;
      if(monto<=0)return;
      pagosParciales.push({metodo:selPay,monto:Math.min(parseFloat(monto.toFixed(2)),pendiente)});
      if(inp)inp.value='';
      rFooter();
    });
    ftr.querySelectorAll('[data-rp]').forEach(el=>el.addEventListener('click',()=>{
      pagosParciales.splice(parseInt(el.dataset.rp),1);rFooter();

function attachProd(){
  const mc=document.getElementById('mc');
  mc.querySelector('#prod-search')?.addEventListener('input',e=>{
    prodSearch=e.target.value;
    const pos=e.target.selectionStart;
    render();
    const ns=document.getElementById('prod-search');
    if(ns){ns.focus();ns.setSelectionRange(pos,pos);}
  });
  mc.querySelector('#bpn')?.addEventListener('click',()=>{editP='new';render();});
  mc.querySelector('#bpc')?.addEventListener('click',()=>{editP=null;render();});
  mc.querySelector('#bps')?.addEventListener('click',async()=>{
    const name=document.getElementById('fn').value.trim();
    const category=document.getElementById('fcat').value;
    const subcategory=document.getElementById('fsub').value.trim();
    const price=parseFloat(document.getElementById('fprice').value);
    const stock=parseInt(document.getElementById('fstk').value)||0;
    const code=document.getElementById('fcode').value.trim();
    const author=document.getElementById('fauth').value.trim();
    const stockControl=document.getElementById('fctrl').value;
    const hasVariants=document.getElementById('fvar').value==='1';
    if(!name||isNaN(price))return alert('Nombre y precio son requeridos');
    const obj={name,category,subcategory,price,stock,code,author,active:true,stockControl,hasVariants};
    if(editP==='new'){P.push({...obj,id:`p${Date.now()}`});}
    else{const p=P.find(x=>x.id===editP);if(p)Object.assign(p,obj);}
    await sP();editP=null;render();
  });
  mc.querySelectorAll('[data-pe]').forEach(el=>el.addEventListener('click',()=>{editP=el.dataset.pe;render();}));
  mc.querySelectorAll('[data-pt]').forEach(el=>el.addEventListener('click',async()=>{
    const pwd=prompt('PIN de autorización:');
    if(pwd!==CORRECT_PIN){alert('PIN incorrecto.');return;}
    const p=P.find(x=>x.id===el.dataset.pt);if(p){p.active=!p.active;await sP();}
  }));

  // CSV Import
  mc.querySelector('#bpimport')?.addEventListener('click',()=>{
    const panel=document.getElementById('import-panel');
    if(!panel)return;
    if(panel.style.display==='block'){panel.style.display='none';return;}
    panel.style.display='block';
    panel.innerHTML=`<div class="card" style="margin-bottom:14px;background:var(--bbg);border-color:var(--bbrd)">
      <div style="font-weight:700;font-size:13px;margin-bottom:8px;color:var(--blu)">Importación masiva de productos</div>
      <div style="font-size:12px;color:var(--text2);margin-bottom:12px;line-height:1.7">
        El CSV debe tener estas columnas en orden:<br>
        <code style="background:var(--bg3);padding:2px 6px;border-radius:4px;font-size:11px">Nombre;Categoria;Subcategoria;Precio;Stock;Codigo;Autor;ControlStock;Variantes</code><br>
        <span style="font-size:11px;color:var(--text3)">ControlStock: unidad o sin_control · Variantes: si o no</span>
      </div>
      <div style="margin-bottom:10px">
        <a href="#" id="adescargar-template" style="font-size:12px;color:var(--blu)">↓ Descargar plantilla CSV</a>
      </div>
      <input type="file" id="csv-file" accept=".csv" style="font-size:12px;margin-bottom:10px;display:block">
      <div id="import-preview" style="font-size:12px;color:var(--text2);margin-bottom:10px"></div>
      <div style="display:flex;gap:7px">
        <button class="btn btn-g btn-sm" id="bpimportcancel">Cancelar</button>
        <button class="btn btn-b" id="bpimportdo" style="display:none">Importar productos</button>
      </div>
    </div>`;

    // Download template
    document.getElementById('adescargar-template')?.addEventListener('click',e=>{
      e.preventDefault();
      const template='Nombre;Categoria;Subcategoria;Precio;Stock;Codigo;Autor;ControlStock;Variantes\n'
        +'El Nombre del Libro;Libros;Novela;15.00;3;9789876543210;Apellido Nombre;unidad;no\n'
        +'Americano;Café;Espresso;2.50;999;;; sin_control;si\n'
        +'Brownie;Postres;Horneados;2.50;20;;;unidad;no';
      const blob=new Blob([template],{type:'text/csv;charset=utf-8'});
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a');a.href=url;a.download='plantilla_productos_madriguera.csv';a.click();
      URL.revokeObjectURL(url);
    });

    // Cancel
    document.getElementById('bpimportcancel')?.addEventListener('click',()=>{
      panel.style.display='none';
    });

    // File input
    document.getElementById('csv-file')?.addEventListener('change',e=>{
      const file=e.target.files[0];if(!file)return;
      const reader=new FileReader();
      reader.onload=ev=>{
        const text=ev.target.result;
        const lines=text.split('\n').filter(l=>l.trim());
        const preview=document.getElementById('import-preview');
        const btn=document.getElementById('bpimportdo');
        if(lines.length<2){preview.textContent='Archivo vacío o inválido';return;}
        // Parse
        const rows=[];
        const sep=lines[0].includes(';')?';':',';
        for(let i=1;i<lines.length;i++){
          const cols=lines[i].split(sep).map(v=>v.trim().replace(/^"|"$/g,''));
          if(!cols[0]||!cols[3])continue;
          const price=parseFloat(cols[3].replace(',','.'));
          if(isNaN(price))continue;
          rows.push({
            id:'p'+Date.now()+i,
            name:cols[0],
            category:cols[1]||'Libros',
            subcategory:cols[2]||'',
            price,
            stock:parseInt(cols[4])||0,
            code:cols[5]||'',
            author:cols[6]||'',
            stockControl:(cols[7]||'unidad').trim()==='sin_control'?'sin_control':'unidad',
            hasVariants:(cols[8]||'no').trim().toLowerCase()==='si',
            active:true
          });
        }
        if(rows.length===0){preview.innerHTML='<span style="color:var(--red)">No se encontraron filas válidas. Verifica el formato.</span>';btn.style.display='none';return;}
        
        // Check duplicates
        const existing=rows.filter(r=>P.find(p=>p.name.toLowerCase()===r.name.toLowerCase()));
        const newOnes=rows.filter(r=>!P.find(p=>p.name.toLowerCase()===r.name.toLowerCase()));
        
        preview.innerHTML=`<div style="color:var(--grn);font-weight:600">${rows.length} productos encontrados en el CSV</div>
          <div>• <strong>${newOnes.length}</strong> nuevos a agregar</div>
          ${existing.length>0?`<div style="color:var(--amber)">• <strong>${existing.length}</strong> ya existen (se actualizarán precio y stock)</div>`:''}
          <div style="font-size:11px;color:var(--text3);margin-top:6px">Vista previa: ${rows.slice(0,3).map(r=>r.name).join(', ')}${rows.length>3?'...':''}`;
        
        btn.style.display='block';
        btn.dataset.rows=JSON.stringify(rows);
      };
      reader.readAsText(file,'UTF-8');
    });

    // Do import
    document.getElementById('bpimportdo')?.addEventListener('click',async()=>{
      const btn=document.getElementById('bpimportdo');
      const rows=JSON.parse(btn.dataset.rows||'[]');
      if(rows.length===0)return;
      btn.textContent='Importando...';btn.disabled=true;
      let added=0,updated=0;
      rows.forEach(r=>{
        const existing=P.find(p=>p.name.toLowerCase()===r.name.toLowerCase());
        if(existing){
          existing.price=r.price;existing.stock=r.stock;
          if(r.code)existing.code=r.code;
          if(r.author)existing.author=r.author;
          if(r.subcategory)existing.subcategory=r.subcategory;
          updated++;
        } else {
          P.push(r);added++;
        }
      });
      await sP();
      panel.style.display='none';
      alert('✓ Importación completa: '+added+' nuevos, '+updated+' actualizados.');
    });
  });
}

// ── DASHBOARD ─────────────────────────────────────────────────
function rDash(){
  const ts=openS(),tT=ts.reduce((a,x)=>a+x.total,0);
  const allT=S.reduce((a,x)=>a+x.total,0);
  const mes=new Date().toISOString().slice(0,7);
  const mesS=S.filter(s=>isVenta(s)&&s.date.startsWith(mes)),mesT=mesS.reduce((a,x)=>a+x.total,0);
  const dias=new Set(mesS.map(s=>s.date.slice(0,10))).size||1;
  const prom=mesT/dias;
  const dm=new Date(new Date().getFullYear(),new Date().getMonth()+1,0).getDate();
  const last7=Array.from({length:7},(_,i)=>{
    const d=new Date();d.setDate(d.getDate()-(6-i));
    const ds=d.toISOString().slice(0,10);
    const dS=S.filter(s=>s.date&&s.date.startsWith(ds)&&!s.esFactura&&!s.esGasto&&!s.esCierre);
    return{l:d.toLocaleDateString('es-EC',{weekday:'short'}),t:dS.reduce((a,x)=>a+x.total,0),td:ds===today()};
  });
  const mx=Math.max(...last7.map(d=>d.t),1);
  const byPay=PAY.map(m=>{let t=0,ct=0;ts.forEach(s=>{if(s.pagosParciales&&s.pagosParciales.length>0){const pp=s.pagosParciales.filter(p=>p.metodo===m);if(pp.length>0){t+=pp.reduce((a,p)=>a+p.monto,0);ct++;}}else if(s.paymentMethod===m){t+=s.total;ct++;}});return{m,t,c:ct};});
  const imap={};ts.forEach(s=>s.items.forEach(i=>{if(!imap[i.name])imap[i.name]={q:0,r:0};imap[i.name].q+=i.qty;imap[i.name].r+=i.price*i.qty;}));
  const top=Object.entries(imap).sort((a,b)=>b[1].r-a[1].r).slice(0,8);
  return `<div>
    <div class="sg3">
      <div class="scard"><div class="slbl">Ventas hoy</div><div class="sval">${fmt(tT)}</div><div class="ssub">${ts.length} pedidos</div></div>
      <div class="scard"><div class="slbl">Ticket prom.</div><div class="sval">${fmt(ts.length?tT/ts.length:0)}</div></div>
      <div class="scard"><div class="slbl">Histórico</div><div class="sval">${fmt(allT)}</div><div class="ssub">${S.length} total</div></div>
    </div>
    <div class="sg3">
      <div class="scard"><div class="slbl">Mes</div><div class="sval">${fmt(mesT)}</div><div class="ssub">${mesS.length} ped.</div></div>
      <div class="scard"><div class="slbl">Prom. diario</div><div class="sval">${fmt(prom)}</div></div>
      <div class="scard"><div class="slbl">Proyección</div><div class="sval">${fmt(prom*dm)}</div></div>
    </div>
    <div class="sg2">
      <div class="card"><div style="font-weight:600;font-size:12px;margin-bottom:9px">Últimos 7 días</div>
        <div class="barchart">${last7.map(d=>`<div class="bw">
          ${d.t>0?`<div class="bv">${fmt(d.t)}</div>`:''}
          <div class="bar${d.td?' td':''}" style="height:${Math.max((d.t/mx)*70,d.t>0?4:1)}px"></div>
          <div class="bl">${d.l}</div></div>`).join('')}
        </div>
      </div>
      <div class="card"><div style="font-weight:600;font-size:12px;margin-bottom:9px">Métodos (hoy)</div>
        ${byPay.map(p=>`<div style="margin-bottom:9px">
          <div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px"><span>${p.m}</span><span style="font-weight:700">${fmt(p.t)}</span></div>
          <div style="height:3px;background:var(--bg3);border-radius:2px"><div style="height:3px;background:var(--acc);border-radius:2px;width:${tT>0?Math.round(p.t/tT*100):0}%"></div></div>
        </div>`).join('')}
      </div>
    </div>
    ${top.length>0?`<div class="card" style="margin-bottom:12px"><div style="font-weight:600;font-size:12px;margin-bottom:9px">Más vendidos hoy</div>
      ${top.map(([n,d])=>`<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:.5px solid var(--border);font-size:12px"><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;min-width:0;margin-right:8px">${n}</span><span style="color:var(--text3);flex-shrink:0">${d.q}× <strong>${fmt(d.r)}</strong></span></div>`).join('')}
    </div>`:''}
    <div class="stitle">Pedidos de hoy</div>
    ${ts.length===0?`<div style="text-align:center;padding:30px;color:var(--text3)">Sin pedidos hoy</div>`:
      [...ts].reverse().slice(0,20).map(s=>`<div class="mrow" style="margin-bottom:5px">

      </div>`).join('')}
  </div>`;
}

          <div style="display:flex;justify-content:space-between;font-size:12px;padding:4px 0;border-bottom:.5px solid var(--border)"><span>+ Ventas en efectivo</span><span>${fmt(efectivoVentas)}</span></div>
          <div style="display:flex;justify-content:space-between;font-size:12px;padding:4px 0;border-bottom:.5px solid var(--border)"><span>− Gastos en efectivo</span><span style="color:var(--red)">−${fmt(gastosEfectivo)}</span></div>
          <div style="display:flex;justify-content:space-between;font-size:13px;font-weight:700;padding-top:8px"><span>Debería haber</span><span>${fmt(deberia)}</span></div>

        <div class="fg" style="margin-bottom:${conteoVal>0?'10px':'13px'}"><label>Conteo físico del efectivo ($)</label>
          <input id="cconteo" type="number" step="0.01" value="${conteoVal||''}" placeholder="Cuenta el dinero y escribe aquí"${yaHayCierre?' readonly':''}></div>
        ${conteoVal>0?`<div style="display:flex;justify-content:space-between;padding:10px 13px;border-radius:var(--rs);${diffBg};border:1px solid;font-weight:700;font-size:13px;margin-bottom:13px">

        </div>`:''}
        <div class="fg" style="margin-bottom:10px"><label>Responsable</label>
          <input id="cresp" value="${todayCierre?.responsable||turnoUser}"${yaHayCierre?' readonly':''}></div>
        <div class="fg" style="margin-bottom:13px"><label>Observaciones</label>
          <input id="cobs" placeholder="Notas del cierre..." value="${todayCierre?.obs||''}"${yaHayCierre?' readonly':''}></div>
        ${!yaHayCierre?`<div style="display:flex;flex-direction:column;gap:7px">
          <div style="display:flex;gap:7px">
            <button class="btn btn-b" style="flex:1;font-size:12px" id="bguardar-inicio">💾 Guardar inicio</button>
            <button class="btn btn-g" id="bcalcular" style="flex:1">Actualizar</button>
          </div>
          <button class="btn btn-w" style="padding:10px" id="bcerrar">Cerrar caja del día</button>

  if(cajaTab==='historial'){
    body=`<div>
      <div style="font-size:13px;font-weight:700;margin-bottom:14px">Historial de cierres de caja</div>
      ${cierresAnteriores.length===0?'<div style="text-align:center;padding:40px;color:var(--text3)">Sin cierres registrados</div>':
        cierresAnteriores.map(cr=>{
          const dia=cr.date.slice(0,10);
          const ventasDia=S.filter(s=>!s.esCierre&&!s.esGasto&&!s.esDevolucion&&!s.esFactura&&!s.esCancelacion&&s.date&&s.date.startsWith(dia));
          const gastosDia=S.filter(s=>s.esGasto&&s.date&&s.date.startsWith(dia));
          const totalVentas=ventasDia.reduce((a,x)=>a+x.total,0);
          const totalGastos=gastosDia.reduce((a,x)=>a+x.total,0);
          const dif=(cr.conteo||0)-(cr.inicio+totalVentas-gastosDia.filter(g=>g.paymentMethod==='Efectivo').reduce((a,g)=>a+g.total,0));
          const difColor=Math.abs(dif)<0.5?'var(--grn)':dif>0?'var(--blu)':'var(--red)';
          return `<div class="card" style="margin-bottom:10px">

              <div style="text-align:center"><div style="color:var(--text3);font-size:10px;margin-bottom:2px">Conteo</div><div style="font-weight:700">${fmt(cr.conteo||0)}</div></div>

  return `<div>
    <div class="rb" style="margin-bottom:12px">
      <span class="stitle" style="margin:0">Caja</span>
      <div style="display:flex;gap:7px;align-items:center">
        <span style="font-size:11px;color:var(--text3)">${turnoUser}</span>
        <button class="btn btn-g btn-sm" id="bctcambio">Cambiar turno</button>
      </div>
    </div>
    ${tabs}${body}
  </div>`;
}

function attachCaja(){
  const mc=document.getElementById('mc');
  mc.querySelector('#bctcambio')?.addEventListener('click',()=>{turnoUser='';localStorage.removeItem('madu_turno');view='pos';render();});
  mc.querySelectorAll('[data-cajatab]').forEach(el=>el.addEventListener('click',()=>{cajaTab=el.dataset.cajatab;gastoForm=false;editGasto=null;render();}));
  mc.querySelector('#bgnew')?.addEventListener('click',()=>{gastoForm=true;editGasto=null;render();});
  mc.querySelector('#bgcancel')?.addEventListener('click',()=>{gastoForm=false;editGasto=null;render();});
  mc.querySelector('#bgsave')?.addEventListener('click',async()=>{
    const desc=document.getElementById('gdesc').value.trim();
    const cat=document.getElementById('gcat').value;
    const monto=parseFloat(document.getElementById('gmonto').value);
    const payM=document.getElementById('gpay').value;
    const obs=document.getElementById('gobs').value.trim();
    if(!desc||isNaN(monto)||monto<=0)return alert('Descripción y monto son requeridos');
    if(editGasto){
      const g=S.find(s=>s.id===editGasto.id);
      if(g)Object.assign(g,{desc,cat,total:monto,paymentMethod:payM,obs});
    } else {
      S.push({id:`g${Date.now()}`,esGasto:true,desc,cat,total:monto,paymentMethod:payM,obs,date:new Date().toISOString(),user:turnoUser,closed:false});
    }
    await sS();gastoForm=false;editGasto=null;
  });
  mc.querySelectorAll('[data-gedit]').forEach(el=>el.addEventListener('click',()=>{
    const g=S.find(s=>s.id===el.dataset.gedit);if(!g)return;
    editGasto=g;gastoForm=true;render();
  }));
  mc.querySelectorAll('[data-gdel]').forEach(el=>el.addEventListener('click',async()=>{
    if(!confirm('¿Eliminar este gasto?'))return;
    S=S.filter(s=>s.id!==el.dataset.gdel);render();sS();
  }));
  mc.querySelector('#bcalcular')?.addEventListener('click',()=>{render();});
  mc.querySelector('#bguardar-inicio')?.addEventListener('click',async()=>{
    const inicio=parseFloat(document.getElementById('cinicio')?.value)||0;
    const sueltos=parseFloat(document.getElementById('csueltos')?.value)||0;
    // Save as a special 'apertura' record so it persists across renders
    const existing=S.findIndex(s=>s.esApertura&&s.date&&s.date.startsWith(today()));
    if(existing>=0){
      S[existing].inicio=inicio;S[existing].sueltos=sueltos;
    } else {
      S.push({id:'ap'+Date.now(),esApertura:true,inicio,sueltos,date:new Date().toISOString(),user:turnoUser,total:0,closed:false});
    }
    await sS();
    alert('✓ Inicio de caja guardado: $'+inicio.toFixed(2)+(sueltos?' + sueltos $'+sueltos.toFixed(2):''));
  });
  mc.querySelector('#bcerrar')?.addEventListener('click',async()=>{
    const inicio=parseFloat(document.getElementById('cinicio')?.value)||0;
    const sueltos2=parseFloat(document.getElementById('csueltos')?.value)||0;
    const conteo2=parseFloat(document.getElementById('cconteo')?.value)||0;
    const resp=document.getElementById('cresp')?.value||turnoUser;
    const obs=document.getElementById('cobs')?.value||'';
    if(!conteo2&&!confirm('El conteo es $0.00 ¿Confirmar cierre?'))return;
    S.push({id:`cierre${Date.now()}`,esCierre:true,inicio,sueltos:sueltos2,conteo:conteo2,responsable:resp,obs,date:new Date().toISOString(),total:0,closed:false});
    S.forEach(s=>{if(!s.esCierre&&!s.esGasto&&s.date.startsWith(today()))s.closed=true;});
    render();sS();
  });
}

function attachInv(){
  const mc=document.getElementById('mc');
  mc.querySelectorAll('[data-es]').forEach(el=>el.addEventListener('click',()=>{

}

function rMonitor(){
  const ocp=T.filter(t=>t.status!=='libre');

  return `<div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <span class="stitle" style="margin:0">Monitor en vivo</span>
      <span style="font-size:11px;color:var(--text3)">Se actualiza automáticamente</span>
    </div>
    <div class="sg3" style="margin-bottom:16px">
      <div class="scard"><div class="slbl">Mesas ocupadas</div><div class="sval" style="color:var(--amb)">${ocp.length}</div><div class="ssub">de ${T.length} total</div></div>
      <div class="scard"><div class="slbl">Mesas libres</div><div class="sval" style="color:var(--grn)">${lib.length}</div></div>

        return `<div style="border-radius:var(--r);padding:14px;border:1.5px solid ${ocp?'#fcd34d':'var(--border)'};background:${ocp?'#fffbe6':'var(--bg3)'}">
          <div style="font-weight:700;font-size:13px;margin-bottom:4px">${t.name}</div>
          ${ocp?`<div style="font-size:11px;color:var(--text2)">${t.order.reduce((a,i)=>a+i.qty,0)} ítems · ${fmt(tT)}</div>
            <div style="font-size:10px;color:${tiempoColor};margin-top:3px">⏱ ${mins} min</div>
            <div style="font-size:10px;color:var(--text3);margin-top:3px">${t.order.slice(0,2).map(i=>i.qty+'x '+i.name).join(', ')}${t.order.length>2?'...':''}</div>`
